<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jack Sisk — Digital Marketing Coordinator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: #D6F0FA;
    color: #0D2B38;
    font-family: 'Plus Jakarta Sans', sans-serif;
    overflow-x: hidden;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #D6F0FA; }
  ::-webkit-scrollbar-thumb { background: #3ABDE8; border-radius: 3px; }

  /* Nav */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 48px;
    background: rgba(214, 240, 250, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(58, 189, 232, 0.15);
    transition: box-shadow 0.3s;
  }
  .nav.scrolled { box-shadow: 0 4px 24px rgba(13, 43, 56, 0.08); }
  .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; color: #0D2B38; letter-spacing: -0.01em; }
  .nav-logo span { color: #3ABDE8; }
  .nav-links { display: flex; gap: 32px; }
  .nav-links a { font-size: 0.875rem; font-weight: 500; color: #0D2B38; text-decoration: none; opacity: 0.7; transition: opacity 0.2s, color 0.2s; }
  .nav-links a:hover { opacity: 1; color: #3ABDE8; }
  .nav-cta {
    background: #F05E5E; color: white; border: none; padding: 10px 22px;
    border-radius: 100px; font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 600; font-size: 0.875rem; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .nav-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(240,94,94,0.35); }

  /* Mobile nav */
  .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
  .hamburger span { display: block; width: 22px; height: 2px; background: #0D2B38; margin: 5px 0; border-radius: 2px; transition: all 0.3s; }
  .mobile-menu {
    display: none; position: fixed; top: 72px; left: 0; right: 0; z-index: 99;
    background: #D6F0FA; border-bottom: 1px solid rgba(58,189,232,0.2);
    flex-direction: column; gap: 0; overflow: hidden;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a { padding: 16px 24px; font-weight: 500; color: #0D2B38; text-decoration: none; border-bottom: 1px solid rgba(58,189,232,0.1); }

  @media (max-width: 768px) {
    .nav { padding: 16px 24px; }
    .nav-links { display: none; }
    .nav-cta { display: none; }
    .hamburger { display: block; }
  }

  /* Sections */
  section { position: relative; }

  /* Hero */
  .hero {
    min-height: 100vh; display: flex; flex-direction: column;
    justify-content: center; align-items: flex-start;
    padding: 120px 48px 80px;
    background: #D6F0FA; overflow: hidden;
    position: relative;
  }
  .hero-blob {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.45; pointer-events: none;
    animation: blobFloat 8s ease-in-out infinite;
  }
  .hero-blob-1 { width: 480px; height: 480px; background: #3ABDE8; top: -100px; right: -80px; }
  .hero-blob-2 { width: 320px; height: 320px; background: #A8EDD4; bottom: 40px; left: -60px; animation-delay: -3s; }
  .hero-blob-3 { width: 200px; height: 200px; background: #F05E5E; top: 30%; right: 20%; animation-delay: -5s; opacity: 0.2; }
  @keyframes blobFloat {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-20px) scale(1.03); }
  }
  .hero-eyebrow {
    font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; font-size: 0.875rem;
    letter-spacing: 0.12em; text-transform: uppercase; color: #3ABDE8;
    background: rgba(58,189,232,0.12); padding: 6px 14px; border-radius: 100px;
    display: inline-block; margin-bottom: 28px;
    opacity: 0; transform: translateY(20px);
    animation: fadeUp 0.7s 0.2s forwards;
  }
  .hero-name {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: clamp(4rem, 10vw, 9rem); line-height: 0.92; letter-spacing: -0.03em;
    color: #0D2B38; margin-bottom: 32px; position: relative;
    opacity: 0; transform: translateY(30px);
    animation: fadeUp 0.8s 0.35s forwards;
  }
  .hero-name .accent { color: #3ABDE8; display: inline-block; }
  .hero-name .cursor {
    display: inline-block; width: 6px; height: 0.9em; background: #F05E5E;
    margin-left: 6px; vertical-align: middle;
    animation: blink 1.1s 1.5s step-end infinite;
    border-radius: 2px;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .hero-tagline {
    font-size: clamp(1.1rem, 2.5vw, 1.5rem); font-weight: 400; color: #0D2B38;
    max-width: 560px; line-height: 1.55; opacity: 0.85; margin-bottom: 48px;
    opacity: 0; transform: translateY(20px);
    animation: fadeUp 0.8s 0.55s forwards;
  }
  .hero-tagline strong { font-weight: 600; }
  .hero-actions {
    display: flex; gap: 16px; flex-wrap: wrap;
    opacity: 0; transform: translateY(20px);
    animation: fadeUp 0.8s 0.75s forwards;
  }
  .btn-primary {
    background: #F05E5E; color: white; border: none; padding: 16px 32px;
    border-radius: 100px; font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 600; font-size: 1rem; cursor: pointer;
    text-decoration: none; display: inline-block;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(240,94,94,0.4); }
  .btn-secondary {
    background: transparent; color: #0D2B38; border: 2px solid rgba(13,43,56,0.25);
    padding: 14px 30px; border-radius: 100px;
    font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; font-size: 1rem; cursor: pointer;
    text-decoration: none; display: inline-block;
    transition: border-color 0.2s, background 0.2s, transform 0.2s;
  }
  .btn-secondary:hover { border-color: #3ABDE8; background: rgba(58,189,232,0.08); transform: translateY(-2px); }
  .hero-scroll {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    opacity: 0; animation: fadeUp 0.8s 1.2s forwards;
  }
  .hero-scroll span { font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.5; }
  .scroll-arrow { width: 28px; height: 28px; border-right: 2px solid #0D2B38; border-bottom: 2px solid #0D2B38;
    transform: rotate(45deg); opacity: 0.4; animation: bounce 1.5s ease-in-out infinite; }
  @keyframes bounce { 0%, 100% { transform: rotate(45deg) translateY(0); } 50% { transform: rotate(45deg) translateY(5px); } }
  .hero-tag-cloud {
    position: absolute; right: 48px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 12px;
    opacity: 0; animation: fadeUp 0.8s 0.9s forwards;
  }
  .hero-tag {
    background: white; border-radius: 100px; padding: 10px 18px;
    font-size: 0.8rem; font-weight: 600; color: #0D2B38;
    box-shadow: 0 4px 16px rgba(13,43,56,0.08);
    transition: transform 0.25s, box-shadow 0.25s;
    cursor: default; white-space: nowrap;
  }
  .hero-tag:hover { transform: scale(1.05) translateX(-4px); box-shadow: 0 8px 24px rgba(13,43,56,0.14); }
  .hero-tag.blue { background: #3ABDE8; color: white; }
  .hero-tag.mint { background: #A8EDD4; }
  .hero-tag.red { background: #F05E5E; color: white; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Reveal animation */
  .reveal {
    opacity: 0; transform: translateY(40px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  .reveal-delay-1 { transition-delay: 0.1s; }
  .reveal-delay-2 { transition-delay: 0.2s; }
  .reveal-delay-3 { transition-delay: 0.3s; }
  .reveal-delay-4 { transition-delay: 0.4s; }
  .reveal-delay-5 { transition-delay: 0.5s; }

  /* Section shared */
  .section-label {
    font-size: 0.8rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
    color: #3ABDE8; margin-bottom: 16px; display: block;
  }
  .section-heading {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: clamp(2rem, 4vw, 3.2rem); letter-spacing: -0.02em; line-height: 1.1;
    color: #0D2B38; margin-bottom: 24px;
  }
  .section-body {
    font-size: 1.05rem; line-height: 1.75; color: #0D2B38; opacity: 0.8;
    max-width: 640px;
  }

  /* About */
  .about {
    background: #ffffff; padding: 120px 48px;
  }
  .about-inner {
    max-width: 1200px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center;
  }
  .about-visual {
    position: relative; display: flex; justify-content: center; align-items: center;
  }
  .about-avatar-wrap {
    width: 320px; height: 320px; border-radius: 32px; overflow: hidden; position: relative;
    background: #A8EDD4; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px;
    box-shadow: 20px 20px 0 #3ABDE8;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .about-avatar-wrap:hover { transform: translate(-4px, -4px); box-shadow: 24px 24px 0 #3ABDE8; }
  .avatar-initials {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 5rem; color: #0D2B38; line-height: 1;
  }
  .avatar-sub { font-size: 0.85rem; font-weight: 500; color: #0D2B38; opacity: 0.6; }
  .about-badge {
    position: absolute; background: #F05E5E; color: white; padding: 10px 18px;
    border-radius: 100px; font-weight: 700; font-size: 0.8rem;
    box-shadow: 0 4px 16px rgba(240,94,94,0.4);
    white-space: nowrap;
  }
  .about-badge-1 { top: -12px; right: -20px; transform: rotate(6deg); }
  .about-badge-2 { bottom: -12px; left: -20px; background: #0D2B38; transform: rotate(-4deg); box-shadow: 0 4px 16px rgba(13,43,56,0.25); }
  .about-stats {
    display: flex; gap: 24px; margin-top: 40px; flex-wrap: wrap;
  }
  .stat-card {
    background: #D6F0FA; border-radius: 16px; padding: 18px 22px;
    flex: 1; min-width: 120px;
    transition: transform 0.25s, box-shadow 0.25s;
  }
  .stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 28px rgba(13,43,56,0.1); }
  .stat-num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; color: #3ABDE8; }
  .stat-label { font-size: 0.78rem; font-weight: 500; color: #0D2B38; opacity: 0.65; margin-top: 2px; }
  .about-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 28px; }
  .about-tag {
    background: #D6F0FA; color: #0D2B38; padding: 6px 14px; border-radius: 100px;
    font-size: 0.8rem; font-weight: 600; transition: background 0.2s, transform 0.2s;
  }
  .about-tag:hover { background: #A8EDD4; transform: scale(1.04); }

  /* Skills */
  .skills { background: #D6F0FA; padding: 120px 48px; }
  .skills-inner { max-width: 1200px; margin: 0 auto; }
  .skills-header { text-align: center; margin-bottom: 64px; }
  .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
  .skill-card {
    background: #A8EDD4; border-radius: 24px; padding: 32px 28px;
    cursor: default; position: relative; overflow: hidden;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s;
  }
  .skill-card:hover { transform: translateY(-8px) rotate(-1deg); box-shadow: 0 24px 48px rgba(13,43,56,0.14); }
  .skill-card::before {
    content: ''; position: absolute; top: -40px; right: -40px;
    width: 120px; height: 120px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    transition: transform 0.4s;
  }
  .skill-card:hover::before { transform: scale(1.4); }
  .skill-icon { font-size: 2.2rem; margin-bottom: 16px; display: block; }
  .skill-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; color: #0D2B38; margin-bottom: 8px; }
  .skill-desc { font-size: 0.85rem; color: #0D2B38; opacity: 0.7; line-height: 1.6; }
  .skill-bar-wrap { margin-top: 16px; background: rgba(13,43,56,0.12); border-radius: 100px; height: 4px; }
  .skill-bar { height: 4px; border-radius: 100px; background: #0D2B38; transition: width 1.2s cubic-bezier(0.4,0,0.2,1); }
  .skill-card.featured { background: #3ABDE8; }
  .skill-card.featured .skill-name, .skill-card.featured .skill-desc { color: white; }
  .skill-card.featured .skill-desc { opacity: 0.8; }
  .skill-card.featured .skill-bar-wrap { background: rgba(255,255,255,0.2); }
  .skill-card.featured .skill-bar { background: white; }

  /* Life */
  .life { background: #ffffff; padding: 120px 48px; }
  .life-inner { max-width: 1200px; margin: 0 auto; }
  .life-header { margin-bottom: 64px; }
  .bento-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-template-rows: auto;
    gap: 16px;
  }
  .bento-card {
    border-radius: 28px; padding: 36px 36px 32px; overflow: hidden; position: relative;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s;
    cursor: default;
  }
  .bento-card:hover { transform: translateY(-6px); box-shadow: 0 24px 48px rgba(13,43,56,0.13); }
  .bento-card:nth-child(1) { grid-column: span 5; background: #3ABDE8; }
  .bento-card:nth-child(2) { grid-column: span 7; background: #A8EDD4; }
  .bento-card:nth-child(3) { grid-column: span 4; background: #0D2B38; }
  .bento-card:nth-child(4) { grid-column: span 4; background: #F05E5E; cursor: pointer; }
  .bento-card:nth-child(5) { grid-column: span 4; background: #D6F0FA; }
  .bento-num {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 0.75rem; letter-spacing: 0.14em; text-transform: uppercase;
    opacity: 0.45; margin-bottom: 20px; display: block;
  }
  .bento-card:nth-child(1) .bento-num,
  .bento-card:nth-child(3) .bento-num,
  .bento-card:nth-child(4) .bento-num { color: white; }
  .bento-card:nth-child(2) .bento-num,
  .bento-card:nth-child(5) .bento-num { color: #0D2B38; }
  .bento-title {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: clamp(1.4rem, 2.2vw, 2rem); line-height: 1.1; letter-spacing: -0.02em;
    margin-bottom: 14px;
  }
  .bento-card:nth-child(1) .bento-title,
  .bento-card:nth-child(3) .bento-title,
  .bento-card:nth-child(4) .bento-title { color: white; }
  .bento-card:nth-child(2) .bento-title,
  .bento-card:nth-child(5) .bento-title { color: #0D2B38; }
  .bento-desc {
    font-size: 0.88rem; line-height: 1.65;
  }
  .bento-card:nth-child(1) .bento-desc,
  .bento-card:nth-child(3) .bento-desc,
  .bento-card:nth-child(4) .bento-desc { color: rgba(255,255,255,0.75); }
  .bento-card:nth-child(2) .bento-desc,
  .bento-card:nth-child(5) .bento-desc { color: rgba(13,43,56,0.65); }
  .bento-pill {
    display: inline-block; margin-top: 20px;
    border-radius: 100px; padding: 5px 14px;
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
  }
  .bento-card:nth-child(1) .bento-pill { background: rgba(255,255,255,0.2); color: white; }
  .bento-card:nth-child(2) .bento-pill { background: rgba(13,43,56,0.1); color: #0D2B38; }
  .bento-card:nth-child(3) .bento-pill { background: rgba(255,255,255,0.12); color: white; }
  .bento-card:nth-child(4) .bento-pill { background: rgba(255,255,255,0.2); color: white; }
  .bento-card:nth-child(5) .bento-pill { background: rgba(13,43,56,0.1); color: #0D2B38; }
  .bento-big { 
    position: absolute; right: 28px; bottom: 24px; 
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 5rem; line-height: 1; opacity: 0.08; letter-spacing: -0.04em;
    pointer-events: none; color: inherit;
  }
  @media (max-width: 860px) {
    .bento-grid { grid-template-columns: 1fr 1fr; }
    .bento-card:nth-child(n) { grid-column: span 1; }
    .bento-card:nth-child(2) { grid-column: span 2; }
  }
  @media (max-width: 520px) {
    .bento-grid { grid-template-columns: 1fr; }
    .bento-card:nth-child(n) { grid-column: span 1; }
  }

  /* Coffee easter egg */
  .coffee-counter {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    background: #0D2B38; color: white; border-radius: 16px; padding: 12px 18px;
    font-size: 0.85rem; font-weight: 600; pointer-events: none;
    opacity: 0; transition: opacity 0.4s;
    box-shadow: 0 8px 24px rgba(13,43,56,0.3);
  }
  .coffee-counter.show { opacity: 1; }

  /* Contact */
  .contact {
    background: #0D2B38; padding: 100px 48px; text-align: center;
  }
  .contact-inner { max-width: 700px; margin: 0 auto; }
  .contact-eyebrow { color: #3ABDE8; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 20px; display: block; }
  .contact-heading {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(2rem, 4vw, 3rem);
    color: white; letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 24px;
  }
  .contact-heading span { color: #3ABDE8; }
  .contact-body { font-size: 1.05rem; color: rgba(255,255,255,0.65); line-height: 1.7; margin-bottom: 48px; }
  .contact-links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-bottom: 64px; }
  .contact-link {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.08); color: white; padding: 14px 24px;
    border-radius: 100px; text-decoration: none; font-weight: 600; font-size: 0.9rem;
    border: 1px solid rgba(255,255,255,0.12);
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
  }
  .contact-link:hover { background: #3ABDE8; border-color: #3ABDE8; transform: translateY(-3px); box-shadow: 0 12px 28px rgba(58,189,232,0.35); }
  .contact-link.red:hover { background: #F05E5E; border-color: #F05E5E; box-shadow: 0 12px 28px rgba(240,94,94,0.35); }
  .contact-divider { width: 60px; height: 1px; background: rgba(255,255,255,0.1); margin: 0 auto 32px; }
  .contact-faith { font-size: 0.85rem; color: rgba(255,255,255,0.3); font-style: italic; letter-spacing: 0.02em; }

  /* Responsive */
  @media (max-width: 900px) {
    .about-inner { grid-template-columns: 1fr; gap: 48px; }
    .about-visual { order: -1; }
    .hero-tag-cloud { display: none; }
  }
  @media (max-width: 640px) {
    .hero { padding: 100px 24px 80px; }
    .about, .skills, .life, .contact { padding: 80px 24px; }
    .about-avatar-wrap { width: 260px; height: 260px; }
  }

  /* Marquee */
  .marquee-wrap { overflow: hidden; white-space: nowrap; padding: 20px 0; background: #3ABDE8; }
  .marquee-track { display: inline-flex; gap: 48px; animation: marquee 22s linear infinite; }
  .marquee-item { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; color: white; opacity: 0.85; }
  .marquee-dot { color: rgba(255,255,255,0.4); }
  @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
</style>
</head>
<body>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
    }, { threshold: 0.12 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

function Nav() {

    const fn = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);
  const links = [['About', '#about'], ['Skills', '#skills'], ['Life', '#life'], ['Contact', '#contact']];
  return (
    <>
      <nav className={`nav${scrolled ? ' scrolled' : ''}`}>
        <div className="nav-logo">Jack<span>.</span></div>
        <div className="nav-links">
          {links.map(([l, h]) => <a key={l} href={h}>{l}</a>)}

        <a href="#contact" className="nav-cta" style={{textDecoration:'none'}}>Say hi</a>

      </nav>
      <div className={`mobile-menu${open ? ' open' : ''}`}>
        {links.map(([l, h]) => <a key={l} href={h} onClick={() => setOpen(false)}>{l}</a>)}

      </div>
    </>
  );
}

function Skills() {
